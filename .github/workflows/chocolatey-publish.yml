name: Chocolatey Publish

# Generated by the choco-setup skill.
# Packs the chocolatey/ package and pushes it to the Chocolatey Community
# Repository on every published release. Versions, download URLs, and SHA256
# checksums are filled from the release's checksums.txt asset.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download checksums.txt
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" --pattern "checksums.txt" --dir .

      - name: Update package files with version, URLs, and checksums
        shell: bash
        run: |
          RELEASE_TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${RELEASE_TAG#v}"

          AMD64_SHA=$(grep "windows_amd64.zip" checksums.txt | awk '{print $1}')
          ARM64_SHA=$(grep "windows_arm64.zip" checksums.txt | awk '{print $1}' || true)
          echo "==> Version: $VERSION"
          echo "==> amd64 SHA256: $AMD64_SHA"
          echo "==> arm64 SHA256: $ARM64_SHA"
          if [ -z "$AMD64_SHA" ]; then echo "::error::no amd64 checksum found"; exit 1; fi

          # Fallback: if no arm64 archive, use amd64 (Windows on ARM runs x64 via emulation).
          if [ -z "$ARM64_SHA" ]; then
            ARM64_SHA="$AMD64_SHA"
            echo "==> (no arm64 archive — falling back to amd64 checksum)"
          fi

          # nuspec: version + release-notes tag
          sed -i "s|<version>[0-9][0-9.]*</version>|<version>${VERSION}</version>|" chocolatey/genplaylist.nuspec
          sed -i "s|/releases/tag/v[0-9][0-9.]*|/releases/tag/${RELEASE_TAG}|" chocolatey/genplaylist.nuspec

          # install script: download URLs + checksums
          INSTALL=chocolatey/tools/chocolateyInstall.ps1
          sed -i "s|/download/v[0-9][0-9.]*/genplaylist_[0-9][0-9.]*_windows_amd64.zip|/download/${RELEASE_TAG}/genplaylist_${VERSION}_windows_amd64.zip|" "$INSTALL"
          sed -i "s|/download/v[0-9][0-9.]*/genplaylist_[0-9][0-9.]*_windows_arm64.zip|/download/${RELEASE_TAG}/genplaylist_${VERSION}_windows_arm64.zip|" "$INSTALL"
          sed -i "s|\$checksum64\(\s*\)= '.*'|\$checksum64\1= '${AMD64_SHA}'|" "$INSTALL"
          sed -i "s|\$checksum64arm\(\s*\)= '.*'|\$checksum64arm\1= '${ARM64_SHA}'|" "$INSTALL"

      - name: Pack Chocolatey package
        shell: pwsh
        run: choco pack chocolatey/genplaylist.nuspec --outputdirectory chocolatey/

      - name: Push to Chocolatey Community Repository
        shell: pwsh
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          $pkg = Get-ChildItem chocolatey/*.nupkg | Select-Object -First 1
          choco push $pkg.FullName --source https://push.chocolatey.org/ --api-key $env:CHOCOLATEY_API_KEY
