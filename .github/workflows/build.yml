name: build

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: genplaylist
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: genplaylist.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build -o ${{ matrix.binary }} .
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: genplaylist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ matrix.binary }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: genplaylist-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: genplaylist*
          fail_on_unmatched_files: true
